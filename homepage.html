<!DOCTYPE html>
<html lang="en">

<head>
    <title>KOREA with U</title>
    <link rel="icon" href="images/logo.png"> <!-- icon บนแท็ป title bar -->

    <style>
        body {
            margin: 0;
            background-color: #ffffff;
            font-family: Arial;
        }

        nav {
            position: fixed; /* ทำให้เมนูอยู่ด้านบนตลอดเวลา */
            top: 0;
            left: 0;
            width: 96.4%;
            z-index: 1000; /* ทำให้เมนูอยู่เหนือเนื้อหาอื่นๆ */
            background-color: white;
            display: flex;
            justify-content: space-between;
            font-family: Arial;
            align-items: center;
            padding: 10px 30px;
            border-bottom: 1.5px solid #e9edf5;
        }

        .logo img {
            width: 100px;
        }

        .menu {
            display: flex;
            gap: 40px;
        }

        .menu a {
            text-decoration: none;
            color: #42526e;
            font-size: 20px;
        }

        nav a:hover { /* เพิ่มเอฟเฟกต์เมื่อ hover บนลิงก์ในเมนู */
            color: black; /* เปลี่ยนสีเมื่อเม้าส์ชี้ */
            transition: color 0.3s ease; /* เพิ่มความนุ่มนวลในการเปลี่ยนแปลง */
        }

    </style>
</head>

<body>
    <nav>
        <div class="logo">
            <a href="homepage.html">
                <img src="images/logo.png">
            </a>
        </div>

        <div class="menu">
            <a href="homepage.html">Home</a>
            <a href="choose.html" target="_blank">Places</a>
            <a href="https://www.google.com/maps" target="_blank">Maps</a>

        </div>
    </nav>

    <div>
        <a href="choose.html">
            <img src="images/BG.jpg">
        </a>
    </div>

    <style>
        img {
            width: 100%;
            height: auto;
        }
    </style>

</body>
</html>
